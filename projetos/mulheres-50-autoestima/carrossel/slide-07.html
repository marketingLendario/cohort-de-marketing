<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;background:#FAF6F0;font-family:'Inter',-apple-system,sans-serif;color:#7A3B4A;overflow:hidden;}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:104px 96px;}
.top{display:flex;flex-direction:column;align-items:center;gap:14px;}
.eyebrow{font-size:24px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#B08D3F;display:flex;align-items:center;justify-content:center;gap:18px;}
.eyebrow .rule{display:inline-block;width:48px;height:2px;background:#C9A961;}
.count{font-size:23px;font-weight:600;letter-spacing:0.16em;color:#9C7A6E;}
.count b{color:#7A3B4A;}
.num{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:250px;line-height:0.9;color:#C9A961;letter-spacing:-0.02em;margin-top:8px;text-shadow:0 8px 26px rgba(122,59,74,0.14);}
.phrase{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;color:#7A3B4A;font-size:78px;line-height:1.07;letter-spacing:-0.01em;margin-top:20px;max-width:840px;}
.divider{width:110px;height:3px;background:#C9A961;margin:44px auto 38px;border-radius:2px;}
.reframe{font-size:38px;font-weight:400;line-height:1.55;color:#5A2630;max-width:800px;}
.foot{position:absolute;bottom:58px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:24px;}
.dots{display:flex;align-items:center;justify-content:center;gap:14px;}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(122,59,74,0.22);}
.dot.on{background:#C9A961;width:34px;border-radius:6px;}
.swipe{font-size:21px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#B08D3F;}
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <div class="eyebrow"><span class="rule"></span>Sinal<span class="rule"></span></div>
    <div class="count"><b>06</b> de 06</div>
  </div>
  <div class="num">06</div>
  <div class="phrase">Você se olha no espelho e não se reconhece.</div>
  <div class="divider"></div>
  <div class="reframe">Não é a ruga que te incomoda. É não saber mais quem é aquela mulher ali.</div>
  <div class="foot">
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot on"></span></div>
    <div class="swipe">deslize &rarr;</div>
  </div>
</div>
</body>
</html>
