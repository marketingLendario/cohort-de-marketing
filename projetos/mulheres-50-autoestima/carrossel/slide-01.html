<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;background:#FAF6F0;font-family:'Inter',-apple-system,sans-serif;color:#7A3B4A;overflow:hidden;}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:92px 96px;}
.eyebrow{font-size:24px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#B08D3F;margin-bottom:44px;display:flex;align-items:center;justify-content:center;gap:20px;}
.eyebrow .rule{display:inline-block;width:56px;height:2px;background:#C9A961;}
.photo{width:820px;height:500px;border-radius:30px;object-fit:cover;object-position:50% 26%;box-shadow:0 24px 60px rgba(90,38,48,0.28);border:1px solid rgba(201,169,97,0.55);}
h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;color:#7A3B4A;font-size:88px;line-height:1.04;letter-spacing:-0.01em;max-width:840px;margin-top:56px;}
.sub{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:500;color:#B08D3F;font-size:50px;line-height:1.15;margin-top:22px;}
.badge{margin-top:50px;display:flex;align-items:center;justify-content:center;gap:20px;font-size:30px;font-weight:500;color:#5A2630;letter-spacing:0.01em;}
.badge .n{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:96px;line-height:0.8;color:#C9A961;}
.swipe{position:absolute;bottom:58px;left:0;right:0;font-size:21px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#B08D3F;}
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow"><span class="rule"></span>Os sinais<span class="rule"></span></div>
  <img class="photo" src="foto-capa.jpg" alt="Mulher madura de cabelos grisalhos, olhar de frente com presença e dignidade, luz quente">
  <h1>Os sinais de que você virou&nbsp;invisível</h1>
  <div class="sub">(e ninguém te avisou)</div>
  <div class="badge"><span class="n">6</span><span>sinais pra<br>reconhecer em você</span></div>
  <div class="swipe">deslize &rarr;</div>
</div>
</body>
</html>
