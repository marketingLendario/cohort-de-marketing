<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offerbook — {{TITULO}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --background: #0A0A0A;
    --bg-elevated: #121212;
    --card: #161616;
    --card-hover: #1C1C1C;
    --raised: #262626;
    --border-strong: #383838;
    --foreground: #F5F5F5;
    --foreground-soft: #E5E5E5;
    --muted-foreground: #999999;
    --muted-foreground-light: #707070;
    --primary: #BFBFBF;
    --primary-light: #E5E5E5;
    --primary-deep: #595959;
    --accent-winner: #23E169;
    --accent-warn: #FFC857;
    --font-body: 'Source Serif 4', Georgia, serif;
    --font-ui: Inter, system-ui, sans-serif;
    --font-display: Inter, system-ui, sans-serif;
    --font-mono: ui-monospace, Menlo, monospace;
    --toc-width: 280px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body {
    margin: 0; padding: 0;
    background: var(--background); color: var(--foreground);
    font-family: var(--font-body); font-size: 17px; line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* === LAYOUT 2 COLUNAS === */
  .layout {
    display: grid;
    grid-template-columns: var(--toc-width) 1fr;
    max-width: 1280px; margin: 0 auto;
    min-height: 100vh;
  }

  /* === SIDEBAR TOC === */
  .toc {
    position: sticky; top: 0;
    height: 100vh; overflow-y: auto;
    padding: 40px 24px 40px 32px;
    border-right: 1px solid var(--raised);
    background: var(--bg-elevated);
  }
  .toc::-webkit-scrollbar { width: 4px; }
  .toc::-webkit-scrollbar-track { background: transparent; }
  .toc::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 2px; }

  .toc-brand {
    font-family: var(--font-display); font-size: 0.72rem; font-weight: 800;
    color: var(--primary); text-transform: uppercase; letter-spacing: 0.14em;
    margin-bottom: 8px;
  }
  .toc-titulo {
    font-family: var(--font-display); font-size: 1.15rem; font-weight: 700;
    color: var(--foreground); line-height: 1.3; margin: 0 0 24px;
  }
  .toc-label {
    font-family: var(--font-ui); font-size: 0.7rem; font-weight: 700;
    color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.1em;
    margin: 24px 0 12px; padding-top: 16px;
    border-top: 1px solid var(--raised);
  }
  .toc-label:first-of-type { border-top: none; padding-top: 0; }
  .toc ul { list-style: none; padding: 0; margin: 0; }
  .toc ul li { margin: 0; }
  .toc ul li a {
    display: block; padding: 7px 12px;
    font-family: var(--font-ui); font-size: 0.88rem;
    color: var(--muted-foreground); text-decoration: none;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    border-radius: 0 4px 4px 0;
  }
  .toc ul li a:hover {
    color: var(--foreground); background: var(--card);
  }
  .toc ul li a.active {
    color: var(--foreground); background: var(--card);
    border-left-color: var(--primary); font-weight: 600;
  }
  /* Sub-items (H3) */
  .toc ul li ul {
    margin: 2px 0 4px 12px;
    border-left: 1px solid var(--raised); padding-left: 4px;
  }
  .toc ul li ul li a {
    font-size: 0.82rem; padding: 5px 10px;
    color: var(--muted-foreground-light);
  }

  /* === CONTEÚDO === */
  .conteudo {
    padding: 56px 56px 96px;
    max-width: 820px;
  }

  /* HERO */
  .hero {
    margin-bottom: 56px; padding-bottom: 32px;
    border-bottom: 1px solid var(--raised);
  }
  .kicker {
    display: inline-block; font-family: var(--font-ui); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--primary);
    padding: 7px 16px; border: 1px solid var(--primary-deep); border-radius: 9999px; margin-bottom: 20px;
  }
  .hero h1 {
    font-family: var(--font-display); font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 800; line-height: 1.05; letter-spacing: -0.025em;
    margin: 0 0 12px;
  }
  .hero .meta {
    font-family: var(--font-ui); font-size: 0.95rem;
    color: var(--muted-foreground); margin: 8px 0 0;
  }

  /* HEADINGS DO CONTEÚDO */
  h2 {
    font-family: var(--font-display); font-size: 1.9rem; font-weight: 800;
    letter-spacing: -0.02em; color: var(--foreground);
    margin: 64px 0 16px; padding-top: 8px;
    scroll-margin-top: 32px;
  }
  h2:first-of-type { margin-top: 16px; }
  h3 {
    font-family: var(--font-display); font-size: 1.35rem; font-weight: 700;
    color: var(--foreground); margin: 40px 0 14px;
    scroll-margin-top: 32px;
  }
  h4 {
    font-family: var(--font-ui); font-size: 0.85rem; font-weight: 700;
    color: var(--primary); text-transform: uppercase; letter-spacing: 0.08em;
    margin: 28px 0 10px;
  }

  /* PARÁGRAFOS E TEXTO */
  p { margin: 0 0 18px; color: var(--foreground-soft); }
  strong { color: var(--foreground); font-weight: 700; }
  em { color: var(--primary-light); font-style: italic; }

  /* LISTAS */
  ul, ol { margin: 0 0 20px; padding-left: 24px; }
  li { margin-bottom: 8px; color: var(--foreground-soft); }
  li strong { color: var(--foreground); }

  /* CÓDIGO */
  code {
    font-family: var(--font-mono); background: var(--bg-elevated);
    padding: 2px 7px; border-radius: 4px; font-size: 0.88em;
    color: var(--primary-light);
  }
  pre {
    background: var(--card); border: 1px solid var(--raised);
    border-radius: 10px; padding: 20px 24px;
    overflow-x: auto; margin: 16px 0;
  }
  pre code { background: transparent; padding: 0; font-size: 0.85rem; }

  /* BLOCKQUOTE (verbatim do cliente / citação) */
  blockquote {
    background: var(--card); border-left: 4px solid var(--primary);
    padding: 18px 24px; margin: 20px 0;
    border-radius: 0 12px 12px 0;
    font-family: var(--font-body); font-style: italic;
    color: var(--primary-light);
  }
  blockquote p { color: var(--primary-light); margin-bottom: 8px; }
  blockquote p:last-child { margin-bottom: 0; }

  /* HR */
  hr {
    border: none; border-top: 1px solid var(--raised);
    margin: 48px 0;
  }

  /* LINKS */
  a {
    color: var(--primary); text-decoration: none;
    border-bottom: 1px solid var(--primary-deep);
    transition: all 0.15s;
  }
  a:hover { color: var(--primary-light); border-color: var(--primary); }

  /* TABELAS */
  table {
    width: 100%; border-collapse: collapse; margin: 20px 0;
    font-family: var(--font-ui); font-size: 0.92rem;
    background: var(--card); border-radius: 10px; overflow: hidden;
  }
  th, td {
    text-align: left; padding: 12px 16px;
    border-bottom: 1px solid var(--raised);
  }
  th {
    color: var(--primary); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; font-size: 0.75rem;
    background: var(--bg-elevated);
  }
  td { color: var(--foreground-soft); }
  tr:last-child td { border-bottom: none; }

  /* CALLOUTS */
  .callout {
    border-radius: 12px; padding: 18px 24px; margin: 24px 0;
    font-family: var(--font-ui); font-size: 0.95rem;
  }
  .callout.lacuna {
    background: rgba(255, 200, 87, 0.06); border: 1px solid var(--accent-warn);
  }
  .callout.lacuna::before {
    content: "⚠ Lacuna"; display: block; font-weight: 700;
    color: var(--accent-warn); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .callout.confirmado {
    background: rgba(35, 225, 105, 0.06); border: 1px solid var(--accent-winner);
  }
  .callout.confirmado::before {
    content: "✓ Confirmado"; display: block; font-weight: 700;
    color: var(--accent-winner); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }

  /* FOOTER */
  .footer {
    margin-top: 80px; padding: 28px 0 0;
    border-top: 1px solid var(--raised);
    font-family: var(--font-ui); font-size: 0.78rem;
    color: var(--muted-foreground); text-align: center;
  }
  .footer .logo {
    font-family: var(--font-display); font-weight: 800;
    color: var(--primary); margin-bottom: 6px;
  }

  /* === MOBILE === */
  .toc-toggle {
    display: none;
    position: fixed; top: 16px; right: 16px;
    z-index: 100;
    background: var(--primary); color: var(--background);
    border: none; border-radius: 8px;
    padding: 10px 16px;
    font-family: var(--font-ui); font-size: 0.85rem; font-weight: 700;
    cursor: pointer;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .toc {
      position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px;
      z-index: 99; transition: left 0.3s ease;
      box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    }
    .toc.open { left: 0; }
    .toc-toggle { display: block; }
    .conteudo { padding: 24px 24px 80px; }
    .hero h1 { font-size: 2rem; }
    h2 { font-size: 1.6rem; }
  }

  @media print {
    html, body { font-size: 11px; }
    .toc, .toc-toggle { display: none; }
    .layout { grid-template-columns: 1fr; }
    .conteudo { padding: 0; max-width: 100%; }
    h2 { page-break-after: avoid; }
    blockquote, table, .callout, pre { page-break-inside: avoid; }
  }
</style>
</head>
<body>
  <button class="toc-toggle" onclick="document.getElementById('toc').classList.toggle('open')">☰ Menu</button>

  <div class="layout">
    <!-- TOC SIDEBAR -->
    <aside class="toc" id="toc">
      <div class="toc-brand">Offerbook</div>
      <h2 class="toc-titulo">{{TITULO_CURTO}}</h2>

      <!-- TOC gerado dinamicamente pelo script:
           <div class="toc-label">Bloco 1</div>
           <ul>
             <li><a href="#materiais">Materiais</a>
               <ul>
                 <li><a href="#links-social-media">Links Social Media</a></li>
                 <li><a href="#materiais-de-apoio">Materiais de apoio</a></li>
               </ul>
             </li>
           </ul>
      -->
      {{TOC}}
    </aside>

    <!-- CONTEÚDO -->
    <main class="conteudo">
      <div class="hero">
        <span class="kicker">Livro da Oferta · Story Selling</span>
        <h1>{{TITULO}}</h1>
        <p class="meta">{{META}}</p>
      </div>

      <!-- Conteúdo gerado pelo script a partir do MD -->
      {{CONTEUDO}}

      <div class="footer">
        <div class="logo">{{MARCA}}</div>
        <p>Offerbook · {{DATA}} · Brief mestre para LP, e-mails e ads.</p>
      </div>
    </main>
  </div>

  <!-- SCROLL SPY: destaca seção ativa no TOC -->
  <script>
    (function() {
      var sections = document.querySelectorAll('main h2, main h3');
      var tocLinks = document.querySelectorAll('.toc a');

      function updateActive() {
        var scrollPos = window.scrollY + 120;
        var current = '';
        sections.forEach(function(sec) {
          if (sec.offsetTop <= scrollPos) {
            current = sec.id;
          }
        });
        tocLinks.forEach(function(link) {
          link.classList.remove('active');
          if (link.getAttribute('href') === '#' + current) {
            link.classList.add('active');
          }
        });
      }

      window.addEventListener('scroll', updateActive, { passive: true });
      window.addEventListener('load', updateActive);

      // Fecha TOC mobile ao clicar num link
      tocLinks.forEach(function(link) {
        link.addEventListener('click', function() {
          document.getElementById('toc').classList.remove('open');
        });
      });
    })();
  </script>
</body>
</html>
