<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Skills • Cohort de Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="mapa-skills-artifacts.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

    body { font-family: 'Inter', system-ui, sans-serif; }

    .font-display {
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 600;
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .layer-active, .view-active {
      background-color: #a78bfa;
      color: #0a0a0f;
      font-weight: 600;
    }

    /* ── Flow canvas (estilo n8n) ── */
    #flow-viewport {
      position: relative;
      height: min(72vh, 680px);
      min-height: 420px;
      background:
        radial-gradient(circle at 20% 20%, rgba(167,139,250,0.05) 0%, transparent 45%),
        #0a0a0f;
      border: 1px solid #27272a;
      border-radius: 1.25rem;
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }
    #flow-viewport.panning { cursor: grabbing; }

    #flow-canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    #flow-svg {
      position: absolute;
      top: 0; left: 0;
      overflow: visible;
      pointer-events: none;
    }

    .flow-edge {
      fill: none;
      stroke: #4b4b5c;
      stroke-width: 2;
      opacity: 0.55;
      transition: opacity 0.2s, stroke 0.2s;
    }
    .flow-edge.active {
      stroke-width: 2.5;
      opacity: 1;
      stroke-dasharray: 10 7;
      animation: edge-flow 0.75s linear infinite;
    }
    .flow-edge.active.outbound {
      stroke: #a78bfa;
      filter: drop-shadow(0 0 5px rgba(167,139,250,0.45));
    }
    .flow-edge.active.inbound {
      stroke: #22c7b1;
      filter: drop-shadow(0 0 5px rgba(34,199,178,0.4));
    }
    .flow-edge.branch { stroke-dasharray: 6 4; opacity: 0.45; }
    .flow-edge.utility { stroke-dasharray: 4 6; stroke: #64748b; opacity: 0.35; }

    @keyframes edge-flow {
      to { stroke-dashoffset: -34; }
    }

    .flow-particle {
      fill: #a78bfa;
      filter: drop-shadow(0 0 4px rgba(167,139,250,0.8));
    }
    .flow-particle.inbound-p {
      fill: #22c7b1;
      filter: drop-shadow(0 0 4px rgba(34,199,178,0.8));
    }

    .flow-node {
      position: absolute;
      width: 196px;
      min-height: 76px;
      background: linear-gradient(145deg, #1a1a22, #121218);
      border: 1.5px solid #2a2a35;
      border-radius: 14px;
      padding: 10px 12px 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      z-index: 2;
    }
    .flow-node::before, .flow-node::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: #1a1a22;
      border: 2px solid #4b4b5c;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      transition: border-color 0.15s, background 0.15s;
    }
    .flow-node::before { left: -6px; }
    .flow-node::after  { right: -6px; }
    .flow-node:hover {
      border-color: rgba(167,139,250,0.6);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .flow-node:hover::before, .flow-node:hover::after {
      border-color: #a78bfa;
    }
    .flow-node.selected {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.25), 0 12px 28px rgba(0,0,0,0.4);
    }
    .flow-node.selected::before, .flow-node.selected::after {
      background: #a78bfa;
      border-color: #a78bfa;
    }
    .flow-node.dimmed { opacity: 0.25; pointer-events: none; }
    .flow-node.unrelated { opacity: 0.3; }
    .flow-node.connected-upstream {
      border-color: rgba(34,199,178,0.55);
      box-shadow: 0 0 0 2px rgba(34,199,178,0.12);
    }
    .flow-node.connected-upstream::before {
      background: #22c7b1;
      border-color: #22c7b1;
    }
    .flow-node.connected-downstream {
      border-color: rgba(167,139,250,0.55);
      box-shadow: 0 0 0 2px rgba(167,139,250,0.12);
    }
    .flow-node.connected-downstream::after {
      background: #a78bfa;
      border-color: #a78bfa;
    }

    .flow-node .fn-order {
      font-size: 9px;
      font-family: ui-monospace, monospace;
      padding: 1px 5px;
      border-radius: 4px;
      background: #27272a;
      color: #71717a;
    }
    .flow-node .fn-name {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      color: #f4f4f5;
    }
    .flow-node .fn-type {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 6px;
      margin-top: 4px;
      display: inline-block;
    }
    .flow-node .fn-phase-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .flow-toolbar {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 4px;
      z-index: 10;
      background: rgba(18,18,24,0.92);
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 4px;
      backdrop-filter: blur(8px);
    }
    .flow-toolbar button {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flow-toolbar button:hover { background: #27272a; color: #fff; }

    .flow-hint {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 10px;
      color: #52525b;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Minimap ── */
    #flow-minimap {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 200px;
      height: 120px;
      z-index: 10;
      background: rgba(18,18,24,0.94);
      border: 1px solid #27272a;
      border-radius: 10px;
      overflow: hidden;
      cursor: crosshair;
      backdrop-filter: blur(8px);
    }
    #flow-minimap canvas { display: block; width: 100%; height: 100%; }
    #minimap-viewport {
      position: absolute;
      border: 1.5px solid rgba(167,139,250,0.7);
      background: rgba(167,139,250,0.08);
      border-radius: 2px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
    }
    #minimap-label {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #52525b;
      pointer-events: none;
    }

    /* ── Tour N12 ── */
    .flow-node.tour-active {
      border-color: #f59e0b !important;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.35), 0 0 24px rgba(245,158,11,0.2) !important;
      animation: tour-pulse 1.2s ease-in-out infinite;
    }
    @keyframes tour-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(245,158,11,0.35), 0 0 16px rgba(245,158,11,0.15); }
      50% { box-shadow: 0 0 0 5px rgba(245,158,11,0.45), 0 0 28px rgba(245,158,11,0.3); }
    }
    #tour-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #121218;
      border: 1px solid #27272a;
      border-radius: 12px;
      font-size: 12px;
    }
    #tour-bar.playing { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.05); }
    .skill-chip {
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .skill-chip:hover { filter: brightness(1.15); }
    .skill-chip-static { cursor: default; opacity: 0.85; }

    .swimlane-label {
      position: absolute;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #3f3f46;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      pointer-events: none;
    }

    /* ── Grid view (legado) ── */
    .node { transition: all 0.2s; cursor: pointer; }
    .node:hover { transform: translateY(-2px) scale(1.02); }
    .node.selected { box-shadow: 0 0 0 3px #a78bfa; transform: scale(1.03); }
    .skill-bubble {
      background: linear-gradient(145deg, #1a1a22, #121218);
      border: 1px solid #2a2a35;
    }
    .skill-bubble:hover { border-color: #a78bfa; }
    .satellite {
      font-size: 10px;
      padding: 1px 6px;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.3);
    }

    /* ── Detail panel ── */
    .artifact-btn {
      font-size: 0.75rem;
      background: #1a1a22;
      border: 1px solid #2a2a35;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }
    .artifact-btn:hover {
      border-color: #a78bfa;
      background: #1f1f2a;
    }
    .artifact-btn .ab-icon { color: #71717a; }
    .artifact-btn:hover .ab-icon { color: #a78bfa; }

    /* ── Artifact preview modal ── */
    #artifact-modal {
      backdrop-filter: blur(4px);
    }
    #artifact-preview-frame {
      background: #fff;
      border: none;
      width: 100%;
      min-height: 400px;
      border-radius: 8px;
    }
    .preview-tab.active {
      background: #a78bfa;
      color: #0a0a0f;
      font-weight: 600;
    }
    .md-preview {
      font-family: Georgia, serif;
      line-height: 1.65;
    }
    .md-preview h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 12px; color: #f4f4f5; }
    .md-preview h2 { font-size: 1.15rem; font-weight: 600; margin: 24px 0 8px; color: #e4e4e7; border-bottom: 1px solid #27272a; padding-bottom: 6px; }
    .md-preview blockquote { border-left: 3px solid #a78bfa; padding: 8px 16px; margin: 12px 0; color: #c4b5fd; background: #18181b; border-radius: 0 8px 8px 0; }
    .md-preview table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 12px 0; }
    .md-preview th, .md-preview td { border: 1px solid #27272a; padding: 8px; text-align: left; }
    .md-preview th { background: #1a1a22; color: #a78bfa; }
    .md-preview code { background: #1a1a22; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; font-family: ui-monospace, monospace; }
    .md-preview pre { background: #18181b; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 0.8rem; }
  </style>
</head>
<body class="bg-[#0a0a0f] text-zinc-200">

  <!-- Header -->
  <div class="border-b border-zinc-800 bg-[#0a0a0f]/95 backdrop-blur sticky top-0 z-50">
    <div class="max-w-[1500px] mx-auto px-6 py-4">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-x-4">
          <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 rounded-2xl bg-violet-500 flex items-center justify-center">
              <i class="fa-solid fa-diagram-project text-white text-lg"></i>
            </div>
            <div>
              <span class="font-display text-2xl tracking-tighter">Cohort</span>
              <span class="font-display text-2xl tracking-tighter text-violet-400">Skills</span>
            </div>
          </div>
          <div class="px-3 py-1 rounded-full bg-zinc-900 text-xs font-medium border border-zinc-800 flex items-center gap-x-1.5">
            <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
            <span class="text-zinc-400">25 skills · exemplos em todas · N12</span>
          </div>
        </div>

        <div class="flex items-center gap-2 text-sm flex-wrap">
          <!-- View mode -->
          <div class="flex items-center bg-zinc-900 border border-zinc-800 rounded-2xl p-1">
            <button onclick="setViewMode('flow')" id="view-flow"
                    class="view-btn px-4 py-1.5 text-xs font-medium rounded-[14px] hover:bg-zinc-800 flex items-center gap-x-2 view-active">
              <i class="fa-solid fa-diagram-project"></i>
              <span class="hidden sm:inline">Fluxo</span>
            </button>
            <button onclick="setViewMode('grid')" id="view-grid"
                    class="view-btn px-4 py-1.5 text-xs font-medium rounded-[14px] hover:bg-zinc-800 flex items-center gap-x-2">
              <i class="fa-solid fa-grip"></i>
              <span class="hidden sm:inline">Grid</span>
            </button>
            <button onclick="setViewMode('mermaid')" id="view-mermaid"
                    class="view-btn px-4 py-1.5 text-xs font-medium rounded-[14px] hover:bg-zinc-800 flex items-center gap-x-2">
              <i class="fa-solid fa-sitemap"></i>
              <span class="hidden sm:inline">Mermaid</span>
            </button>
          </div>

          <a href="briefing.html"
             class="px-3 py-2 text-xs font-medium rounded-2xl bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 flex items-center gap-x-2">
            <i class="fa-solid fa-clipboard-list text-xs"></i>
            <span class="hidden md:inline">Briefing</span>
          </a>

          <button onclick="resetFilters()"
                  class="px-3 py-2 text-xs font-medium rounded-2xl bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 flex items-center gap-x-2">
            <i class="fa-solid fa-undo text-xs"></i>
            <span class="hidden md:inline">Reset</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-[1500px] mx-auto px-6 pt-6">

    <!-- Controls -->
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <div class="relative flex-1 max-w-md">
        <input id="search-input" onkeyup="filterNodes()" type="text"
               placeholder="Buscar skill, artefato ou fase..."
               class="w-full bg-zinc-900 border border-zinc-800 focus:border-violet-500/70 pl-10 py-2.5 text-sm rounded-2xl outline-none">
        <i class="fa-solid fa-search absolute left-4 top-3 text-zinc-500"></i>
      </div>

      <div class="flex items-center gap-1 bg-zinc-900 border border-zinc-800 rounded-2xl p-1 text-xs">
        <div class="px-2 text-zinc-500 font-medium">Camadas:</div>
        <label class="flex items-center gap-x-1.5 px-3 py-1 rounded-xl hover:bg-zinc-800 cursor-pointer">
          <input type="checkbox" id="toggle-connections" checked onchange="applyFilters()" class="accent-violet-400">
          <span>Conexões</span>
        </label>
        <label class="flex items-center gap-x-1.5 px-3 py-1 rounded-xl hover:bg-zinc-800 cursor-pointer">
          <input type="checkbox" id="toggle-guards" checked onchange="applyFilters()" class="accent-violet-400">
          <span>Guards</span>
        </label>
        <label class="flex items-center gap-x-1.5 px-3 py-1 rounded-xl hover:bg-zinc-800 cursor-pointer">
          <input type="checkbox" id="toggle-hubs" checked onchange="applyFilters()" class="accent-violet-400">
          <span>Hubs</span>
        </label>
      </div>

      <button onclick="showLegend()" class="text-xs text-zinc-500 hover:text-zinc-300 flex items-center gap-x-1">
        <i class="fa-solid fa-info-circle"></i> Legenda
      </button>
    </div>

    <!-- FLOW CANVAS (principal) -->
    <div id="flow-container">
      <div id="tour-bar">
        <button onclick="toggleTour()" id="tour-btn"
                class="px-3 py-1.5 rounded-lg bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-xs font-medium flex items-center gap-1.5">
          <i class="fa-solid fa-play" id="tour-icon"></i>
          <span id="tour-label">Tour N12</span>
        </button>
        <button onclick="tourPrev()" class="px-2 py-1.5 rounded-lg bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-xs" title="Anterior">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button onclick="tourNext()" class="px-2 py-1.5 rounded-lg bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-xs" title="Próximo">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
        <div class="flex-1 min-w-0">
          <div id="tour-progress" class="text-zinc-500 text-xs truncate">Percorra a sequência canônica N12 nó a nó</div>
        </div>
        <div id="tour-step" class="text-[10px] font-mono text-zinc-600">—</div>
      </div>
      <div id="flow-viewport">
        <div class="flow-hint">
          <i class="fa-solid fa-hand mr-1"></i> Arraste · Scroll zoom · Minimap · Tour N12
        </div>
        <div id="flow-canvas">
          <svg id="flow-svg"></svg>
          <div id="flow-nodes"></div>
        </div>
        <div class="flow-toolbar">
          <button onclick="flowZoom(0.15)" title="Zoom in"><i class="fa-solid fa-plus"></i></button>
          <button onclick="flowZoom(-0.15)" title="Zoom out"><i class="fa-solid fa-minus"></i></button>
          <button onclick="flowFit()" title="Ajustar à tela"><i class="fa-solid fa-expand"></i></button>
          <button onclick="flowReset()" title="Reset"><i class="fa-solid fa-rotate-left"></i></button>
        </div>
        <div id="flow-minimap" title="Clique para navegar">
          <span id="minimap-label">Minimap</span>
          <canvas id="minimap-canvas" width="200" height="120"></canvas>
          <div id="minimap-viewport"></div>
        </div>
      </div>
    </div>

    <!-- GRID VIEW -->
    <div id="grid-container" class="hidden">
      <div id="cluster-view"></div>
    </div>

    <!-- MERMAID VIEW -->
    <div id="mermaid-container" class="hidden mb-8 p-5 bg-zinc-900/70 border border-zinc-800 rounded-3xl">
      <div class="mermaid" id="mermaid-flow"></div>
      <script type="text/plain" id="mermaid-source">flowchart LR
    A[comecar] --> B[avatar-funil]
    B --> C[espiao-do-concorrente]
    C --> D[trend-hunting]
    D --> E[swipe-file]
    E --> F[offerbook]
    F --> G[design-md]
    G --> H[metodo-funil]
    H --> I[copy-funil]
    I --> J5[vsl / advertorial / lancamento]
    I --> J43[webinario / quiz]
    I --> J21[pagina-vendas]
    J5 & J43 & J21 --> K[conteudo + criativos]
    K --> L[email + whatsapp]
    L --> M[recuperacao + backend]
    M --> N[cro-funil]
    P[status-funil] -.-> N</script>
    </div>

    <!-- Detail Panel -->
    <div id="detail-panel" class="hidden fixed right-6 top-24 bottom-6 w-[400px] bg-[#121218] border border-zinc-800 rounded-3xl shadow-2xl overflow-hidden z-50 flex flex-col">
      <div class="px-5 py-4 border-b border-zinc-800 flex items-center justify-between bg-[#1a1a22]">
        <div class="flex items-center gap-x-3 min-w-0">
          <div id="detail-icon" class="w-9 h-9 rounded-2xl flex items-center justify-center text-xl flex-shrink-0"></div>
          <div class="min-w-0">
            <div id="detail-name" class="font-semibold text-lg truncate"></div>
            <div id="detail-phase" class="text-xs text-zinc-400"></div>
          </div>
        </div>
        <button onclick="closeDetail()" class="text-zinc-400 hover:text-white p-2 flex-shrink-0">
          <i class="fa-solid fa-times text-xl"></i>
        </button>
      </div>
      <div class="flex-1 overflow-auto p-5 space-y-5 text-sm" id="detail-content"></div>
      <div class="p-4 border-t border-zinc-800 bg-[#0f0f15] text-xs">
        <div class="flex items-center gap-2">
          <button onclick="highlightInMap()"
                  class="flex-1 bg-violet-600 hover:bg-violet-500 transition py-2 rounded-2xl text-sm font-medium">
            <i class="fa-solid fa-crosshairs mr-1"></i> Destacar
          </button>
          <button onclick="copySkillCommand()"
                  class="flex-1 border border-zinc-700 hover:bg-zinc-900 py-2 rounded-2xl text-sm font-medium">
            <i class="fa-solid fa-copy mr-1"></i> /comando
          </button>
        </div>
      </div>
    </div>

    <!-- Artifact Preview Modal -->
    <div id="artifact-modal" class="hidden fixed inset-0 bg-black/75 flex items-center justify-center z-[200] p-4">
      <div class="bg-[#121218] border border-zinc-800 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl">
        <div class="px-5 py-4 border-b border-zinc-800 flex items-center justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span id="am-label" class="font-semibold text-base font-mono truncate"></span>
              <span id="am-badge" class="text-[10px] px-2 py-0.5 rounded-full bg-amber-950 text-amber-300 border border-amber-800">exemplo ilustrativo</span>
            </div>
            <div id="am-path" class="text-xs text-zinc-500 font-mono mt-0.5 truncate"></div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <button onclick="copyArtifactPath()" class="text-xs px-3 py-1.5 border border-zinc-700 rounded-xl hover:bg-zinc-900">
              <i class="fa-solid fa-copy mr-1"></i> Caminho

function getNodeCenter(id) {
  const pos = FLOW_POS[id];
  if (!pos) return { x: 0, y: 0 };
  return {
    x: pos.col * CELL_W + NODE_W / 2 + 20,
    y: pos.row * CELL_H + NODE_H / 2 + 20
  };
}

function renderFlowCanvas() {
  const nodesEl = document.getElementById('flow-nodes');
  const svgEl = document.getElementById('flow-svg');
  nodesEl.innerHTML = '';

  // Calculate canvas size
  let maxCol = 0, maxRow = 0;
  Object.values(FLOW_POS).forEach(p => { maxCol = Math.max(maxCol, p.col); maxRow = Math.max(maxRow, p.row); });
  const canvasW = (maxCol + 1) * CELL_W + 80;
  const canvasH = (maxRow + 1) * CELL_H + 80;
  svgEl.setAttribute('width', canvasW);
  svgEl.setAttribute('height', canvasH);
  document.getElementById('flow-canvas').style.width = canvasW + 'px';
  document.getElementById('flow-canvas').style.height = canvasH + 'px';
  canvasMetrics = { w: canvasW, h: canvasH };

  // Swimlane backgrounds
  const lanes = [
    { row: 0, label: 'Nível 5', color: 'rgba(244,63,94,0.04)' },
    { row: 2, label: 'Núcleo N12', color: 'rgba(167,139,250,0.05)' },
    { row: 5, label: 'Suporte', color: 'rgba(100,116,139,0.04)' }
  ];
  let swimHTML = '';
  lanes.forEach(l => {
    const y = l.row * CELL_H;
    swimHTML += `<rect x="0" y="${y}" width="${canvasW}" height="${CELL_H * 2}" fill="${l.color}" rx="0"/>`;
    swimHTML += `<text x="8" y="${y + CELL_H + 4}" fill="#3f3f46" font-size="9" font-weight="600" font-family="Inter,sans-serif" letter-spacing="0.08em">${l.label}</text>`;
  });

  // Draw edges
  const showConns = document.getElementById('toggle-connections')?.checked ?? true;
  let edgesHTML = swimHTML;
  if (showConns) {
    FLOW_EDGES.forEach(([from, to, kind]) => {
      const a = getNodeCenter(from);
      const b = getNodeCenter(to);
      const x1 = a.x + NODE_W / 2 - 10;
      const y1 = a.y;
      const x2 = b.x - NODE_W / 2 + 10;
      const y2 = b.y;
      const mx = (x1 + x2) / 2;
      const cls = kind === 'utility' ? 'flow-edge utility' : (kind === 'branch' ? 'flow-edge branch' : 'flow-edge');
      edgesHTML += `<path class="${cls}" data-from="${from}" data-to="${to}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`;
    });
  }
  svgEl.innerHTML = edgesHTML;

  // Draw nodes
  SKILLS.forEach(skill => {
    const pos = FLOW_POS[skill.id];
    if (!pos) return;
    const el = document.createElement('div');
    el.className = 'flow-node';
    el.dataset.id = skill.id;
    el.style.left = (pos.col * CELL_W + 20) + 'px';
    el.style.top = (pos.row * CELL_H + 20) + 'px';
    el.innerHTML = `
      <div class="flex items-center gap-2 mb-1">
        <div class="fn-phase-dot" style="background:${skill.phaseColor}"></div>
        <span class="fn-name flex-1 truncate">${skill.name}</span>
        ${skill.order < 99 ? `<span class="fn-order">${skill.order}</span>` : ''}
      </div>
      <span class="fn-type" style="background:${skill.phaseColor}18;color:${skill.phaseColor}">${skill.type}</span>
    `;
    el.addEventListener('click', (e) => { e.stopPropagation(); selectSkill(skill.id, el); });
    nodesEl.appendChild(el);
  });

  const prevId = currentSelected?.id;
  if (prevId) {
    const node = document.querySelector(`.flow-node[data-id="${prevId}"]`);
    if (node) {
      node.classList.add('selected');
      highlightFlowEdges(prevId);
    }
  }

  renderMinimap();
  applyFlowTransform();
}

function applyFlowTransform() {
  const canvas = document.getElementById('flow-canvas');
  canvas.style.transform = `translate(${flowState.x}px, ${flowState.y}px) scale(${flowState.scale})`;
  updateMinimapViewport();
}

function initFlowPanZoom() {
  const vp = document.getElementById('flow-viewport');

  document.getElementById('flow-minimap')?.addEventListener('click', onMinimapClick);

  vp.addEventListener('mousedown', (e) => {
    if (e.target.closest('.flow-node') || e.target.closest('.flow-toolbar') || e.target.closest('#flow-minimap')) return;
    cancelPanAnimation();
    flowPanning = true;
    flowPanStart = { x: e.clientX - flowState.x, y: e.clientY - flowState.y };
    vp.classList.add('panning');
  });
  window.addEventListener('mousemove', (e) => {
    if (!flowPanning) return;
    flowState.x = e.clientX - flowPanStart.x;
    flowState.y = e.clientY - flowPanStart.y;
    applyFlowTransform();
  });
  window.addEventListener('mouseup', () => {
    flowPanning = false;
    vp.classList.remove('panning');
  });
  vp.addEventListener('wheel', (e) => {
    e.preventDefault();
    cancelPanAnimation();
    const delta = e.deltaY > 0 ? -0.08 : 0.08;
    const rect = vp.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const newScale = Math.min(2, Math.max(0.3, flowState.scale + delta));
    const ratio = newScale / flowState.scale;
    flowState.x = mx - (mx - flowState.x) * ratio;
    flowState.y = my - (my - flowState.y) * ratio;
    flowState.scale = newScale;
    applyFlowTransform();
  }, { passive: false });
}

function flowZoom(delta) {
  const vp = document.getElementById('flow-viewport');
  const mx = vp.clientWidth / 2;
  const my = vp.clientHeight / 2;
  const newScale = Math.min(2, Math.max(0.3, flowState.scale + delta));
  const ratio = newScale / flowState.scale;
  flowState.x = mx - (mx - flowState.x) * ratio;
  flowState.y = my - (my - flowState.y) * ratio;
  flowState.scale = newScale;
  applyFlowTransform();
}

function getComfortableFocusScale() {
  const vp = document.getElementById('flow-viewport');
  if (!vp || !canvasMetrics.w) return 0.85;
  const fitScale = Math.min((vp.clientWidth - 40) / canvasMetrics.w, (vp.clientHeight - 40) / canvasMetrics.h, 1);
  // ~3.5 colunas visíveis — legível sem zoom out total
  const colScale = (vp.clientWidth * 0.82) / (CELL_W * 3.5);
  return Math.min(1.15, Math.max(fitScale * 1.35, Math.min(colScale, 1)));
}

function flowFit() {
  const vp = document.getElementById('flow-viewport');
  const canvas = document.getElementById('flow-canvas');
  const vpW = vp.clientWidth, vpH = vp.clientHeight;
  const cW = canvas.offsetWidth, cH = canvas.offsetHeight;
  const scale = Math.min((vpW - 40) / cW, (vpH - 40) / cH, 1);
  flowState.scale = scale;
  flowState.x = (vpW - cW * scale) / 2;
  flowState.y = (vpH - cH * scale) / 2;
  applyFlowTransform();
}

function flowReset() {
  flowState = { x: 40, y: 40, scale: 1 };
  applyFlowTransform();
}

function clearFlowHighlight() {
  document.querySelectorAll('.flow-edge').forEach(p => {
    p.classList.remove('active', 'inbound', 'outbound');
  });
  document.querySelectorAll('.flow-node').forEach(el => {
    el.classList.remove('unrelated', 'connected-upstream', 'connected-downstream');
  });
  document.getElementById('flow-particles')?.remove();
}

function highlightFlowEdges(skillId) {
  clearFlowHighlight();
  const connected = new Set([skillId]);

  document.querySelectorAll('.flow-edge').forEach(p => {
    const from = p.dataset.from, to = p.dataset.to;
    const touches = from === skillId || to === skillId;
    if (!touches) return;
    connected.add(from);
    connected.add(to);
    p.classList.add('active');
    p.classList.toggle('outbound', from === skillId);
    p.classList.toggle('inbound', to === skillId);
  });

  document.querySelectorAll('.flow-node').forEach(el => {
    const id = el.dataset.id;
    if (id === skillId) return;
    if (!connected.has(id)) {
      el.classList.add('unrelated');
      return;
    }
    if (FLOW_EDGES.some(([f, t]) => f === id && t === skillId)) el.classList.add('connected-upstream');
    if (FLOW_EDGES.some(([f, t]) => f === skillId && t === id)) el.classList.add('connected-downstream');
  });

  renderFlowParticles(skillId);
}

function renderFlowParticles(skillId) {
  const svg = document.getElementById('flow-svg');
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'flow-particles';

  document.querySelectorAll('.flow-edge.active').forEach((path, i) => {
    const d = path.getAttribute('d');
    if (!d) return;
    const isOut = path.classList.contains('outbound');
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', '3.5');
    circle.setAttribute('class', isOut ? 'flow-particle' : 'flow-particle inbound-p');
    const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
    anim.setAttribute('dur', isOut ? '1.1s' : '1.3s');
    anim.setAttribute('repeatCount', 'indefinite');
    anim.setAttribute('path', d);
    circle.appendChild(anim);
    g.appendChild(circle);
    // Segunda partícula defasada nas saídas principais
    if (isOut && i < 4) {
      const c2 = circle.cloneNode(true);
      const a2 = c2.querySelector('animateMotion');
      a2.setAttribute('begin', '0.55s');
      g.appendChild(c2);
    }
  });

  if (g.childNodes.length) svg.appendChild(g);
}

// ═══════════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════════
function renderMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  if (!canvas || !canvasMetrics.w) return;
  const ctx = canvas.getContext('2d');
  const mw = canvas.width, mh = canvas.height;
  const scale = Math.min(mw / canvasMetrics.w, mh / canvasMetrics.h);
  const ox = (mw - canvasMetrics.w * scale) / 2;
  const oy = (mh - canvasMetrics.h * scale) / 2;

  ctx.clearRect(0, 0, mw, mh);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, mw, mh);

  // edges
  ctx.strokeStyle = '#3f3f46';
  ctx.lineWidth = 0.5;
  FLOW_EDGES.forEach(([from, to]) => {
    const a = getNodeCenter(from), b = getNodeCenter(to);
    const x1 = (a.x + NODE_W / 2) * scale + ox;
    const y1 = a.y * scale + oy;
    const x2 = (b.x - NODE_W / 2) * scale + ox;
    const y2 = b.y * scale + oy;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  });

  // nodes
  SKILLS.forEach(skill => {
    const pos = FLOW_POS[skill.id];
    if (!pos) return;
    const x = (pos.col * CELL_W + 20) * scale + ox;
    const y = (pos.row * CELL_H + 20) * scale + oy;
    const w = NODE_W * scale, h = NODE_H * scale;
    ctx.fillStyle = skill.phaseColor + '99';
    ctx.fillRect(x, y, w, h);
    if (currentSelected?.id === skill.id) {
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - 0.5, y - 0.5, w + 1, h + 1);
    }
  });

  canvas.dataset.ox = ox;
  canvas.dataset.oy = oy;
  canvas.dataset.scale = scale;
  updateMinimapViewport();
}

function updateMinimapViewport() {
  const vp = document.getElementById('flow-viewport');
  const mm = document.getElementById('flow-minimap');
  const rect = document.getElementById('minimap-viewport');
  const canvas = document.getElementById('minimap-canvas');
  if (!vp || !rect || !canvas || !canvasMetrics.w) return;

  const ox = parseFloat(canvas.dataset.ox || 0);
  const oy = parseFloat(canvas.dataset.oy || 0);
  const ms = parseFloat(canvas.dataset.scale || 1);

  const visX = -flowState.x / flowState.scale;
  const visY = -flowState.y / flowState.scale;
  const visW = vp.clientWidth / flowState.scale;
  const visH = vp.clientHeight / flowState.scale;

  rect.style.left = (visX * ms + ox) + 'px';
  rect.style.top = (visY * ms + oy) + 'px';
  rect.style.width = (visW * ms) + 'px';
  rect.style.height = (visH * ms) + 'px';
}

function onMinimapClick(e) {
  const canvas = document.getElementById('minimap-canvas');
  if (!canvas) return;
  const r = canvas.getBoundingClientRect();
  const ox = parseFloat(canvas.dataset.ox || 0);
  const oy = parseFloat(canvas.dataset.oy || 0);
  const ms = parseFloat(canvas.dataset.scale || 1);
  const cx = (e.clientX - r.left) * (canvas.width / r.width);
  const cy = (e.clientY - r.top) * (canvas.height / r.height);
  const worldX = (cx - ox) / ms;
  const worldY = (cy - oy) / ms;
  focusOnPoint(worldX, worldY, true, false);
}

function focusTransformFor(worldX, worldY, targetScale) {
  const vp = document.getElementById('flow-viewport');
  return {
    x: vp.clientWidth / 2 - worldX * targetScale,
    y: vp.clientHeight / 2 - worldY * targetScale,
    scale: targetScale
  };
}

function focusOnPoint(worldX, worldY, animate, keepScale = false) {
  const targetScale = keepScale ? flowState.scale : getComfortableFocusScale();
  const t = focusTransformFor(worldX, worldY, targetScale);
  if (animate) animateFocusTo(t.x, t.y, t.scale);
  else {
    flowState.x = t.x;
    flowState.y = t.y;
    flowState.scale = t.scale;
    applyFlowTransform();
  }
}

function focusOnSkill(skillId, animate = true) {
  const c = getNodeCenter(skillId);
  focusOnPoint(c.x, c.y, animate, false);
}

function cancelPanAnimation() {
  if (panAnimFrame) { cancelAnimationFrame(panAnimFrame); panAnimFrame = null; }
}

function animateFocusTo(tx, ty, targetScale, duration = 480) {
  cancelPanAnimation();
  const sx = flowState.x, sy = flowState.y, ss = flowState.scale;
  const t0 = performance.now();
  function step(now) {
    const p = Math.min(1, (now - t0) / duration);
    const ease = 1 - Math.pow(1 - p, 3);
    flowState.x = sx + (tx - sx) * ease;
    flowState.y = sy + (ty - sy) * ease;
    flowState.scale = ss + (targetScale - ss) * ease;
    applyFlowTransform();
    if (p < 1) panAnimFrame = requestAnimationFrame(step);
    else panAnimFrame = null;
  }
  panAnimFrame = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════
// TOUR N12
// ═══════════════════════════════════════════════════════════
function updateTourUI() {
  const bar = document.getElementById('tour-bar');
  const icon = document.getElementById('tour-icon');
  const label = document.getElementById('tour-label');
  const progress = document.getElementById('tour-progress');
  const step = document.getElementById('tour-step');
  const skill = SKILLS.find(s => s.id === N12_TOUR[tourState.index]);

  bar?.classList.toggle('playing', tourState.active);
  if (icon) icon.className = tourState.active ? 'fa-solid fa-pause' : 'fa-solid fa-play';
  if (label) label.textContent = tourState.active ? 'Pausar tour' : 'Tour N12';
  if (progress && skill) {
    progress.innerHTML = tourState.active
      ? `<span class="text-amber-400">${skill.name}</span> — ${skill.phase}`
      : 'Percorra a sequência canônica N12 nó a nó';
  }
  if (step) step.textContent = skill ? `${tourState.index + 1}/${N12_TOUR.length}` : '—';

  document.querySelectorAll('.flow-node.tour-active').forEach(n => n.classList.remove('tour-active'));
  if (skill) document.querySelector(`.flow-node[data-id="${skill.id}"]`)?.classList.add('tour-active');
}

function tourGoTo(index) {
  tourState.index = Math.max(0, Math.min(N12_TOUR.length - 1, index));
  const skillId = N12_TOUR[tourState.index];
  const node = document.querySelector(`.flow-node[data-id="${skillId}"]`);
  ensureFlowView();
  focusOnSkill(skillId, true);
  selectSkill(skillId, node, true);
  updateTourUI();
  renderMinimap();
}

function scheduleNextTourStep() {
  if (!tourState.active) return;
  if (tourState.timer) clearTimeout(tourState.timer);
  if (tourState.index >= N12_TOUR.length - 1) {
    tourState.timer = setTimeout(() => stopTour(true), 2800);
    return;
  }
  tourState.timer = setTimeout(() => {
    tourGoTo(tourState.index + 1);
    scheduleNextTourStep();
  }, 2800);
}

function toggleTour() {
  if (tourState.active) stopTour();
  else startTour();
}

function startTour(fromIndex) {
  stopTour(false);
  tourState.active = true;
  tourGoTo(typeof fromIndex === 'number' ? fromIndex : tourState.index);
  scheduleNextTourStep();
}

function stopTour(showDone) {
  tourState.active = false;
  if (tourState.timer) { clearTimeout(tourState.timer); tourState.timer = null; }
  document.querySelectorAll('.flow-node.tour-active').forEach(n => n.classList.remove('tour-active'));
  const progress = document.getElementById('tour-progress');
  if (showDone && progress) progress.textContent = `Tour N12 concluído — ${N12_TOUR.length} passos`;
  updateTourUI();
}

function tourNext() {
  stopTour(false);
  tourGoTo(tourState.index + 1, false);
}

function tourPrev() {
  stopTour(false);
  tourGoTo(tourState.index - 1, false);
}

// ═══════════════════════════════════════════════════════════
// NAVEGAÇÃO ENTRE NÓS (pré-requisitos + alimenta)
// ═══════════════════════════════════════════════════════════
function resolveSkillRef(ref) {
  if (!ref || typeof ref !== 'string') return null;
  const raw = ref.trim();
  const lower = raw.toLowerCase().replace(/\s*\([^)]*\)\s*/g, '').trim();

  if (REF_TO_SKILL[lower]) return REF_TO_SKILL[lower];

  let skill = SKILLS.find(s => s.id === lower || s.id === raw);
  if (skill) return skill.id;

  if (/design\.?md/i.test(raw)) return 'design-md';
  if (/funil\.md/i.test(raw)) return 'metodo-funil';
  if (/copy\.md/i.test(raw)) return 'copy-funil';
  if (/\bvsl\b/i.test(raw)) return 'vsl-funil';
  if (/pagina|página/i.test(raw)) return 'pagina-vendas-funil';
  if (/offerbook/i.test(raw)) return 'offerbook';
  if (/email/i.test(raw)) return 'email-funil';
  if (/whatsapp/i.test(raw)) return 'whatsapp-funil';
  if (/recupera/i.test(raw)) return 'recuperacao-funil';
  if (/backend|back-end/i.test(raw)) return 'backend-funil';
  if (/cro/i.test(raw)) return 'cro-funil';
  if (/status/i.test(raw)) return 'status-funil';
  if (/swipe/i.test(raw)) return 'swipe-file';
  if (/avatar/i.test(raw)) return 'avatar-funil';
  if (/espiao|espião/i.test(raw)) return 'espiao-do-concorrente';
  if (/trend/i.test(raw)) return 'trend-hunting';
  if (/metodo|método/i.test(raw)) return 'metodo-funil';
  if (/comecar/i.test(raw)) return 'comecar';

  skill = SKILLS.find(s => lower.includes(s.id) || raw.includes(s.id));
  return skill?.id || null;
}

function renderSkillChip(label, variant) {
  const targetId = resolveSkillRef(label);
  const base = 'text-xs px-2.5 py-1 rounded-xl border skill-chip';
  if (!targetId) {
    return `<span class="${base} skill-chip-static bg-zinc-900 border-zinc-700 text-zinc-400">${label}</span>`;
  }
  const colors = variant === 'prereq'
    ? 'bg-teal-950/80 border-teal-700/50 text-teal-100 hover:bg-teal-900'
    : 'bg-violet-950 border-violet-700/40 text-violet-100 hover:bg-violet-900';
  return `<span onclick="navigateToSkill('${targetId}')" class="${base} ${colors}" title="Ir para ${targetId}">
    <i class="fa-solid fa-arrow-right-to-bracket text-[9px] mr-1 opacity-60"></i>${label}
  </span>`;
}

function navigateToSkill(skillId) {
  if (tourState.active) stopTour(false);
  ensureFlowView();
  const node = document.querySelector(`.flow-node[data-id="${skillId}"]`);
  focusOnSkill(skillId, true);
  selectSkill(skillId, node);
}

function ensureFlowView() {
  if (currentView !== 'flow') setViewMode('flow');
}

// ═══════════════════════════════════════════════════════════
// VIEW MODES
// ═══════════════════════════════════════════════════════════
function setViewMode(mode) {
  const switchingToFlow = mode === 'flow' && currentView !== 'flow';
  currentView = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('view-active'));
  document.getElementById('view-' + mode)?.classList.add('view-active');

  document.getElementById('flow-container').classList.toggle('hidden', mode !== 'flow');
  document.getElementById('grid-container').classList.toggle('hidden', mode !== 'grid');
  document.getElementById('mermaid-container').classList.toggle('hidden', mode !== 'mermaid');

  if (mode === 'grid' && !document.getElementById('cluster-view').innerHTML) renderClusters();
  if (mode === 'mermaid') renderMermaid();
  // flowFit só ao ENTRAR na view — nunca durante navegação entre nós
  if (switchingToFlow) setTimeout(flowFit, 50);
}

function renderMermaid() {
  const div = document.getElementById('mermaid-flow');
  const src = document.getElementById('mermaid-source')?.textContent.trim();
  if (!div || !src) return;
  div.removeAttribute('data-processed');
  div.innerHTML = src;
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad: false, theme: 'dark', flowchart: { curve: 'basis' } });
    setTimeout(() => { try { mermaid.run({ nodes: [div] }); } catch(e) { console.warn(e); } }, 60);
  }
}

// ═══════════════════════════════════════════════════════════
// GRID VIEW (legado)
// ═══════════════════════════════════════════════════════════
function renderClusters() {
  const container = document.getElementById('cluster-view');
  container.innerHTML = '';
  const grouped = {};
  SKILLS.forEach(s => { if (!grouped[s.phase]) grouped[s.phase] = []; grouped[s.phase].push(s); });
  const order = ["Setup","Pesquisa (Aula 1)","Oferta (Aula 1)","Fundação","Copy","Peças do Funil","Aquisição & Conteúdo","Comunicação","Back-end & Recuperação","Otimização","Utilitários"];

  order.forEach(phaseName => {
    if (!grouped[phaseName]) return;
    const section = document.createElement('div');
    section.className = 'mb-8 cluster';
    section.dataset.phase = phaseName;
    const color = grouped[phaseName][0].phaseColor;
    let html = `<div class="flex items-center gap-x-3 mb-3"><div class="w-3 h-3 rounded-full" style="background:${color}"></div><div class="font-semibold text-lg">${phaseName}</div></div><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">`;
    grouped[phaseName].forEach(skill => {
      html += `<div onclick="selectSkill('${skill.id}', this)" class="node skill-bubble rounded-2xl p-3.5 border border-zinc-800" data-id="${skill.id}" data-name="${skill.name}">
        <div class="font-semibold text-sm">${skill.name}</div>
        <div class="text-xs text-zinc-400 mt-1 line-clamp-2">${skill.description}</div>
      </div>`;
    });
    html += '</div>';
    section.innerHTML = html;
    container.appendChild(section);
  });
}

// ═══════════════════════════════════════════════════════════
// ARTIFACTS
// ═══════════════════════════════════════════════════════════
function getArtifactsForSkill(skill) {
  const samples = (window.ARTIFACT_SAMPLES || {})[skill.id];
  if (samples && samples.length) return samples;

  if (!skill.outputs || !skill.outputs.length) return [];
  return skill.outputs.map((o, i) => window.buildGenericArtifact(skill, o, i));
}

function getFormatIcon(format) {
  const m = { md:'fa-file-lines', html:'fa-code', pdf:'fa-file-pdf', docx:'fa-file-word', folder:'fa-folder' };
  return m[format] || 'fa-file';
}

function registerArtifacts(skill, artifacts) {
  artifacts.forEach(art => {
    artifactRegistry[art.id] = { ...art, skillId: skill.id };
  });
}

async function setPdfPreview(sampleUrl) {
  const wrap = document.getElementById('am-preview-pdf-wrap');
  const canvas = document.getElementById('am-preview-pdf-canvas');
  const iframe = document.getElementById('am-preview-pdf');
  const fallback = document.getElementById('am-preview-pdf-fallback');
  iframe.classList.add('hidden');
  iframe.removeAttribute('src');
  fallback.classList.add('hidden');
  wrap.classList.remove('hidden');
  canvas.classList.remove('hidden');
  canvas.dataset.rendered = '0';

  if (!window.pdfjsLib) {
    fallback.classList.remove('hidden');
    fallback.innerHTML = '<p class="text-zinc-400 text-sm">pdf.js não carregou. Abra via servidor HTTP.</p>';
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const pdf = await pdfjsLib.getDocument(sampleUrl).promise;
  const page = await pdf.getPage(1);
  const baseVp = page.getViewport({ scale: 1 });
  const scale = Math.min(1.5, Math.max(0.8, (wrap.clientWidth - 32) / baseVp.width));
  const viewport = page.getViewport({ scale });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport }).promise;
  canvas.dataset.rendered = '1';
  canvas.dataset.sampleUrl = sampleUrl;
}

function clearPdfPreview() {
  const canvas = document.getElementById('am-preview-pdf-canvas');
  const iframe = document.getElementById('am-preview-pdf');
  if (canvas) {
    canvas.classList.add('hidden');
    canvas.dataset.rendered = '0';
    delete canvas.dataset.sampleUrl;
    const ctx = canvas.getContext('2d');
    if (ctx) ctx.clearRect(0, 0, canvas.width || 0, canvas.height || 0);
  }
  if (iframe) { iframe.src = 'about:blank'; iframe.classList.add('hidden'); }
}

async function fetchArtifactContent(artifact) {
  if (!artifact.sampleUrl) return artifact.content || null;
  try {
    const res = await fetch(artifact.sampleUrl);
    if (!res.ok) return artifact.content || null;
    return await res.text();
  } catch {
    return artifact.content || null;
  }
}

async function openArtifactById(artifactId) {
  const artifact = artifactRegistry[artifactId];
  if (!artifact) return;
  await openArtifactPreview(artifact);
}

function getHtmlTwinForArtifact(artifact) {
  if (artifact.htmlId && artifactRegistry[artifact.htmlId]) return artifactRegistry[artifact.htmlId];
  const skillArts = Object.values(artifactRegistry).filter(a => a.skillId === artifact.skillId);
  const base = artifact.label.replace(/\.pdf$/i, '.html');
  return skillArts.find(a => a.format === 'html' && (a.label === base || a.label.includes(base.replace(/^.*\//, ''))));
}

function showArtifactTab(mode) {
  const mdEl = document.getElementById('am-preview-md');
  const htmlEl = document.getElementById('am-preview-html');
  const pdfWrap = document.getElementById('am-preview-pdf-wrap');
  const pdfIframe = document.getElementById('am-preview-pdf');
  const pdfFallback = document.getElementById('am-preview-pdf-fallback');
  mdEl.classList.add('hidden');
  htmlEl.classList.add('hidden');
  pdfWrap.classList.add('hidden');
  pdfIframe.classList.add('hidden');
  pdfFallback.classList.add('hidden');
  document.querySelectorAll('.preview-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === mode);
  });
  if (mode === 'md') mdEl.classList.remove('hidden');
  if (mode === 'html') htmlEl.classList.remove('hidden');
  if (mode === 'pdf') {
    pdfWrap.classList.remove('hidden');
    const canvas = document.getElementById('am-preview-pdf-canvas');
    if (canvas?.dataset.rendered === '1') canvas.classList.remove('hidden');
  }
}

async function openArtifactPreview(artifact) {
  currentArtifact = artifact;
  const modal = document.getElementById('artifact-modal');
  modal.classList.remove('hidden');

  document.getElementById('am-label').textContent = artifact.label;
  document.getElementById('am-path').textContent = artifact.path;
  document.getElementById('am-badge').style.display = artifact.generic ? '' : 'none';

  const tabs = document.getElementById('am-tabs');
  const mdEl = document.getElementById('am-preview-md');
  const htmlEl = document.getElementById('am-preview-html');
  const pdfWrap = document.getElementById('am-preview-pdf-wrap');
  const pdfIframe = document.getElementById('am-preview-pdf');
  const pdfFallback = document.getElementById('am-preview-pdf-fallback');
  const pdfBanner = document.getElementById('am-pdf-banner');

  mdEl.classList.add('hidden');
  htmlEl.classList.add('hidden');
  pdfWrap.classList.add('hidden');
  pdfIframe.classList.add('hidden');
  pdfFallback.classList.add('hidden');
  tabs.innerHTML = '';
  mdEl.innerHTML = '<p class="text-zinc-500 text-sm">Carregando...</p>';

  const fmt = artifact.format;
  const fetched = await fetchArtifactContent(artifact);
  if (fetched) artifact._fetched = fetched;

  if (fmt === 'folder' && (fetched || artifact.content)) {
    tabs.innerHTML = `<button class="preview-tab active text-xs px-3 py-1.5 rounded-t-lg" data-tab="md">Estrutura</button>`;
    const body = fetched || artifact.content;
    mdEl.classList.remove('hidden');
    mdEl.innerHTML = typeof marked !== 'undefined' ? marked.parse(body) : `<pre>${body}</pre>`;
    return;
  }

  if (fmt === 'pdf' || fmt === 'docx') {
    const twin = getHtmlTwinForArtifact(artifact);
    const sampleUrl = artifact.sampleUrl;
    const isDocx = fmt === 'docx';
    const twinHtml = twin ? (await fetchArtifactContent(twin)) || twin.content : null;

    tabs.innerHTML = '';
    if (sampleUrl && !isDocx) {
      tabs.innerHTML += `<button class="preview-tab active text-xs px-3 py-1.5 rounded-t-lg" data-tab="pdf" onclick="showPdfTab('embed')">PDF</button>`;
    }
    if (twinHtml || twin?.sampleUrl) {
      tabs.innerHTML += `<button class="preview-tab ${!sampleUrl || isDocx ? 'active' : ''} text-xs px-3 py-1.5 rounded-t-lg" data-tab="html" onclick="showPdfTab('html')">HTML fonte</button>`;
      if (twin) twin._fetched = twinHtml;
    }

    pdfBanner.innerHTML = isDocx
      ? `<i class="fa-solid fa-file-word text-blue-400 mr-1"></i> DOCX gerado no projeto real. Preview visual = HTML estilizado equivalente.`
      : `<i class="fa-solid fa-file-pdf text-red-400 mr-1"></i> Amostra real de <code class="bg-zinc-800 px-1 rounded">mapa-skills-samples/</code> · Projeto: <span class="font-mono text-zinc-500">${artifact.path}</span>`;

    if (sampleUrl && !isDocx) {
      showArtifactTab('pdf');
      await setPdfPreview(sampleUrl);
      currentArtifact._pdfMode = 'embed';
    } else if (twinHtml || twin?.sampleUrl) {
      showArtifactTab('html');
      if (twin?.sampleUrl) { htmlEl.removeAttribute('srcdoc'); htmlEl.src = twin.sampleUrl; }
      else htmlEl.srcdoc = twinHtml;
      htmlEl.classList.remove('hidden');
    } else {
      showArtifactTab('pdf');
      pdfFallback.classList.remove('hidden');
      pdfFallback.innerHTML = `<p class="text-zinc-400 text-sm">Amostra PDF ainda não gerada. Rode <code>bash sync-mapa-samples.sh</code>.</p>`;
    }
    return;
  }

  const body = fetched || artifact.content;
  if (fmt === 'html' && (body || artifact.sampleUrl)) {
    tabs.innerHTML = `<button class="preview-tab active text-xs px-3 py-1.5 rounded-t-lg" data-tab="html">Preview</button>`;
    htmlEl.classList.remove('hidden');
    if (artifact.sampleUrl && !body) { htmlEl.removeAttribute('srcdoc'); htmlEl.src = artifact.sampleUrl; }
    else { htmlEl.removeAttribute('src'); htmlEl.srcdoc = body; }
  } else if (fmt === 'md' && body) {
    tabs.innerHTML = `<button class="preview-tab active text-xs px-3 py-1.5 rounded-t-lg" data-tab="md">Markdown</button>`;
    mdEl.classList.remove('hidden');
    mdEl.innerHTML = typeof marked !== 'undefined' ? marked.parse(body) : `<pre>${body}</pre>`;
  } else {
    mdEl.classList.remove('hidden');
    mdEl.innerHTML = `<p class="text-zinc-400">Sem preview disponível para este formato.</p><p class="font-mono text-xs mt-2 text-zinc-500">${artifact.path}</p>`;
  }
}

async function showPdfTab(mode) {
  const twin = getHtmlTwinForArtifact(currentArtifact);
  const htmlEl = document.getElementById('am-preview-html');
  if (mode === 'html' && twin) {
    const body = twin._fetched || await fetchArtifactContent(twin) || twin.content;
    if (twin.sampleUrl) { htmlEl.removeAttribute('srcdoc'); htmlEl.src = twin.sampleUrl; }
    else { htmlEl.removeAttribute('src'); htmlEl.srcdoc = body; }
    showArtifactTab('html');
    return;
  }
  if (currentArtifact?.sampleUrl) {
    await setPdfPreview(currentArtifact.sampleUrl);
    showArtifactTab('pdf');
  }
}

function switchPreviewTab(tab) {
  document.querySelectorAll('.preview-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab)));
}

function closeArtifactModal() {
  document.getElementById('artifact-modal').classList.add('hidden');
  clearPdfPreview();
  currentArtifact = null;
}

function copyArtifactPath() {
  if (!currentArtifact) return;
  navigator.clipboard.writeText(currentArtifact.path);
}

// ═══════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════
function selectSkill(skillId, element, fromTour = false) {
  if (tourState.active && !fromTour) stopTour(false);

  document.querySelectorAll('.flow-node.selected, .node.selected').forEach(el => el.classList.remove('selected'));
  if (element) element.classList.add('selected');

  const skill = SKILLS.find(s => s.id === skillId);
  if (!skill) return;
  currentSelected = skill;

  const tourIdx = N12_TOUR.indexOf(skillId);
  if (tourIdx >= 0) tourState.index = tourIdx;

  highlightFlowEdges(skillId);
  renderMinimap();

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');
  panel.classList.add('flex');

  document.getElementById('detail-name').textContent = skill.name;
  document.getElementById('detail-phase').innerHTML = `<span style="color:${skill.phaseColor}">${skill.phase}</span> · ${skill.level}`;

  const iconEl = document.getElementById('detail-icon');
  iconEl.style.background = `${skill.phaseColor}20`;
  iconEl.style.color = skill.phaseColor;
  iconEl.innerHTML = `<i class="fa-solid fa-${getIconForSkill(skill)}"></i>`;

  let content = `<div><div class="section-title mb-1 text-zinc-400">Descrição</div><p class="leading-snug">${skill.description}</p></div>`;

  if (skill.prerequisites?.length) {
    content += `<div><div class="section-title mb-1 text-teal-300"><i class="fa-solid fa-link mr-1"></i> Pré-requisitos <span class="text-zinc-500 font-normal normal-case">(clique para ir)</span></div><div class="flex flex-wrap gap-1.5">${skill.prerequisites.map(p => renderSkillChip(p, 'prereq')).join('')}</div></div>`;
  }

  const artifacts = getArtifactsForSkill(skill);
  registerArtifacts(skill, artifacts);
  if (artifacts.length) {
    content += `<div><div class="section-title mb-2 text-emerald-300"><i class="fa-solid fa-folder-open mr-1"></i> Artefatos gerados <span class="text-zinc-500 font-normal normal-case">(clique para ver)</span></div><div class="space-y-1.5">`;
    artifacts.forEach(art => {
      const icon = getFormatIcon(art.format);
      const hasPreview = art.content || art.format === 'pdf' || art.format === 'docx' || art.sampleUrl || art.htmlId;
      content += `<button onclick="openArtifactById('${art.id}')" class="artifact-btn flex items-center gap-2.5 px-3 py-2 rounded-xl ${hasPreview ? '' : 'opacity-70'}">
        <i class="fa-solid ${icon} ab-icon text-sm w-4"></i>
        <div class="flex-1 min-w-0">
          <div class="font-mono truncate">${art.label}</div>
          <div class="text-[10px] text-zinc-500 truncate">${art.path}</div>
        </div>
        <i class="fa-solid fa-${hasPreview ? 'eye' : 'arrow-up-right-from-square'} text-[10px] text-zinc-600"></i>
      </button>`;
    });
    content += `</div></div>`;
  } else if (skill.outputs?.length) {
    content += `<div><div class="section-title mb-1 text-emerald-300">Artefatos gerados</div><div class="space-y-1">${skill.outputs.map(o => `<div class="text-xs font-mono px-3 py-1.5 bg-zinc-900 border border-zinc-800 rounded-xl">${o}</div>`).join('')}</div></div>`;
  }

  if (skill.feeds?.length) {
    content += `<div><div class="section-title mb-1 text-violet-300"><i class="fa-solid fa-share-nodes mr-1"></i> Alimenta <span class="text-zinc-500 font-normal normal-case">(clique para ir)</span></div><div class="flex flex-wrap gap-1.5">${skill.feeds.map(f => renderSkillChip(f, 'feed')).join('')}</div></div>`;
  }

  if (skill.guards) {
    content += `<div class="p-3 bg-amber-950/30 border border-amber-900/50 rounded-2xl"><div class="section-title text-amber-400 mb-1"><i class="fa-solid fa-shield-halved mr-1"></i> Guards</div><p class="text-xs text-amber-200">${skill.guards}</p></div>`;
  }

  content += `<div class="text-[10px] text-zinc-500 pt-2 border-t border-zinc-800">Ordem N12: <span class="font-mono">${skill.order}</span> · Tipo: ${skill.type}</div>`;
  document.getElementById('detail-content').innerHTML = content;
}

function getIconForSkill(skill) {
  const map = { utility:'cog', research:'search', strategy:'lightbulb', foundation:'layer-group', funnel:'funnel-dollar', acquisition:'bullseye', communication:'envelope', backend:'cogs', optimization:'chart-line', support:'image' };
  return map[skill.type] || 'star';
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('flex');
  document.getElementById('detail-panel').classList.add('hidden');
  document.querySelectorAll('.flow-node.selected, .node.selected').forEach(el => el.classList.remove('selected'));
  clearFlowHighlight();
}

function highlightInMap() {
  if (!currentSelected) return;
  navigateToSkill(currentSelected.id);
}

function copySkillCommand() {
  if (!currentSelected) return;
  navigator.clipboard.writeText('/' + currentSelected.id);
}

// ═══════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════
function filterNodes() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const showHubs = document.getElementById('toggle-hubs')?.checked ?? true;

  document.querySelectorAll('.flow-node').forEach(el => {
    const skill = SKILLS.find(s => s.id === el.dataset.id);
    if (!skill) return;
    let visible = true;
    if (search && !skill.name.includes(search) && !skill.description.toLowerCase().includes(search)) visible = false;
    if (!showHubs && skill.type === 'utility' && skill.id !== 'status-funil') visible = false;
    el.classList.toggle('dimmed', !visible);
    el.style.pointerEvents = visible ? '' : 'none';
  });

  document.querySelectorAll('.node').forEach(el => {
    const skill = SKILLS.find(s => s.id === el.dataset.id);
    if (!skill) return;
    let visible = true;
    if (search && !skill.name.includes(search) && !skill.description.toLowerCase().includes(search)) visible = false;
    el.style.display = visible ? '' : 'none';
  });
}

function applyFilters() {
  renderFlowCanvas();
  filterNodes();
}

function resetFilters() {
  stopTour(false);
  document.getElementById('search-input').value = '';
  ['toggle-connections','toggle-guards','toggle-hubs'].forEach(id => { const el = document.getElementById(id); if (el) el.checked = true; });
  closeDetail();
  flowReset();
  applyFilters();
  setTimeout(flowFit, 80);
}

function showLegend() {
  const legend = document.createElement('div');
  legend.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[100]';
  legend.innerHTML = `<div class="bg-[#121218] border border-zinc-800 rounded-3xl max-w-md w-full mx-4 p-6">
    <div class="flex justify-between items-center mb-5"><div class="font-semibold text-lg">Legenda</div><button class="text-xl" onclick="this.closest('.fixed').remove()">×</button></div>
    <div class="space-y-3 text-sm">
      <div><strong class="text-violet-300">Fluxo</strong> — Canvas estilo n8n. Ao clicar num nó, conexões animam e nós vizinhos destacam.</div>
      <div><strong class="text-emerald-300">Verde</strong> = entradas (upstream) · <strong class="text-violet-300">Roxo</strong> = saídas (downstream)</div>
      <div><strong class="text-teal-300">Pré-requisitos</strong> — Clique para ir ao nó (como em Alimenta).</div>
      <div><strong class="text-amber-300">Tour N12</strong> — Percorre a sequência canônica automaticamente.</div>
      <div><strong class="text-violet-300">Minimap</strong> — Canto inferior direito; clique para saltar no canvas.</div>
      <div class="text-xs text-zinc-400 pt-2 border-t border-zinc-700">Teclas: / buscar · Esc fechar · setas no tour (anterior/próximo)</div>
    </div></div>`;
  document.body.appendChild(legend);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init() {
  renderFlowCanvas();
  initFlowPanZoom();
  setTimeout(flowFit, 100);

  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement.tagName === 'BODY') { e.preventDefault(); document.getElementById('search-input').focus(); }
    if (e.key === 'ArrowRight' && currentView === 'flow') { e.preventDefault(); tourNext(); }
    if (e.key === 'ArrowLeft' && currentView === 'flow') { e.preventDefault(); tourPrev(); }
    if (e.key === ' ' && currentView === 'flow' && document.activeElement.tagName === 'BODY') {
      e.preventDefault();
      toggleTour();
    }
    if (e.key === 'Escape') {
      if (tourState.active) stopTour(false);
      else if (!document.getElementById('artifact-modal').classList.contains('hidden')) closeArtifactModal();
      else if (!document.getElementById('detail-panel').classList.contains('hidden')) closeDetail();
      else resetFilters();
    }
  });

  document.getElementById('artifact-modal').addEventListener('click', (e) => {
    if (e.target.id === 'artifact-modal') closeArtifactModal();
  });
}

window.onload = init;
</script>
