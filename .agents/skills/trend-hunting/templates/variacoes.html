<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variações para Teste — {{TITULO}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;600;700&family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --background: #0A0A0A;
    --card: #0F0F0F;
    --raised: #262626;
    --foreground: #E5E5E5;
    --muted-foreground: #999999;
    --primary: #BFBFBF;
    --primary-light: #E5E5E5;
    --primary-deep: #595959;
    --status-success: #23E169;
    --font-body: 'Source Serif 4', Georgia, serif;
    --font-ui: Inter, system-ui, sans-serif;
    --font-display: Rajdhani, Inter, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--background); color: var(--foreground);
    font-family: var(--font-body); font-size: 17px; line-height: 1.6;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 56px 40px 80px; }

  .hero { text-align: center; padding: 16px 0 40px; border-bottom: 1px solid var(--raised); margin-bottom: 44px; }
  .kicker {
    display: inline-block; font-family: var(--font-ui); font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary);
    padding: 6px 16px; border: 1px solid var(--primary-deep); border-radius: 9999px; margin-bottom: 24px;
  }
  .hero h1 {
    font-family: var(--font-display); font-size: clamp(1.9rem, 5vw, 3rem); font-weight: 700;
    line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 10px;
  }
  .hero .sub { font-family: var(--font-ui); font-size: 0.95rem; color: var(--muted-foreground); }

  h2 {
    font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em;
    color: var(--foreground); margin: 48px 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--raised);
  }
  h3 { font-family: var(--font-ui); font-size: 1rem; font-weight: 700; color: var(--primary-light); margin: 28px 0 10px;
    text-transform: uppercase; letter-spacing: 0.06em; }
  p { margin: 0 0 14px; }
  strong { color: #fff; font-weight: 600; }
  ul, ol { margin: 0 0 16px; padding-left: 22px; }
  li { margin-bottom: 6px; }
  code { font-family: var(--font-mono); background: var(--card); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }

  /* Variação card */
  .variacao {
    background: var(--card); border: 1px solid var(--raised);
    border-radius: 12px; padding: 24px 28px; margin: 20px 0;
  }
  .variacao .numero {
    display: inline-block; font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
    color: var(--primary); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
  }
  .variacao .hook {
    font-family: var(--font-body); font-size: 1.3rem; font-weight: 600; color: var(--primary-light);
    line-height: 1.3; margin: 0 0 16px;
  }
  .variacao .meta { font-family: var(--font-ui); font-size: 0.85rem; color: var(--muted-foreground); }
  .variacao .meta strong { color: var(--primary); }
  .variacao .estrutura { margin: 12px 0; padding-left: 18px; font-family: var(--font-ui); font-size: 0.92rem; }
  .variacao .estrutura li { margin-bottom: 4px; }
  .variacao .cta {
    display: inline-block; margin-top: 12px; padding: 6px 14px;
    background: rgba(35, 225, 105, 0.12); border: 1px solid var(--status-success);
    color: var(--status-success); border-radius: 6px; font-family: var(--font-ui);
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  }

  .footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--raised);
    font-family: var(--font-ui); font-size: 0.78rem; color: var(--muted-foreground); text-align: center; }
  .footer .logo { font-family: var(--font-display); font-weight: 700; color: var(--primary); }

  @media print {
    html, body { font-size: 12px; }
    .wrap { padding: 0 12px; max-width: 100%; }
    h2 { page-break-after: avoid; }
    .variacao { page-break-inside: avoid; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="kicker">Variações para Teste</span>
      <h1>{{TITULO}}</h1>
      <p class="sub">{{SUBTITULO}}</p>
    </div>

    <!-- CONTEUDO: skill injeta aqui as variações (hooks prontos para teste). Cada variação envolvida em <div class="variacao"> com <span class="numero">VARIAÇÃO 1</span>, <p class="hook">hook texto</p>, <ul class="estrutura"><li>passo 1</li>...</ul>, <p class="meta"><strong>Tom:</strong> direto</p>, <span class="cta">CTA: clique aqui</span>. -->
    {{CONTEUDO}}

    <div class="footer">
      <div class="logo">{{MARCA}}</div>
      <p>Variações para teste · {{DATA}} · Rode A/B antes de escalar.</p>
    </div>
  </div>
</body>
</html>
