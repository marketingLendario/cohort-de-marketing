resolved_findings:
  - id: "QA-W3.1-P2-001"
    severity: P2
    status: resolved
    acceptance_criteria: ["AC3", "AC4"]
    title: "Diagnosticador deriva CTR que o Leitor marcou como não fornecido"
    evidence:
      - path: "apps/academia-lendaria-ads-studio/e2e/fixtures/traffic-pilot/evidence/run.json"
        lines: [624, 793, 833, 838]
        detail: "O artefato do Leitor mantém CTR com valor null e selo nao_fornecido, enquanto o artefato/resultMarkdown do Diagnosticador afirma que o CTR aproximado de 0,8% foi derivado de 334 cliques em 41.800 impressões."
      - path: ".claude/skills/leitor-de-metricas/SKILL.md"
        lines: [19, 63]
        detail: "Contrato canônico proíbe calcular CTR e exige nao_fornecido para campo ausente."
      - path: "apps/academia-lendaria-ads-studio/e2e/traffic-squad.spec.ts"
        lines: [143]
        detail: "A asserção E2E valida apenas presença de alavanca/sucesso/reversão; não rejeita derivação de métrica ausente."
    impact: "A saída final apresenta uma métrica não literal ao operador, apesar do input exigir não calcular dados ausentes. Isso quebra a integridade do handoff Leitor→Diagnosticador e torna o PASS declarado para dados literais incompleto."
    required_fix: "Impedir que o Diagnosticador derive ou apresente métricas com selo nao_fornecido; transportar a regra literal no handoff/prompt e adicionar uma asserção E2E que falhe diante de CTR/CPM/CPA/ROAS derivados sem valor literal. Regenerar JSON, relatório e screenshots após a correção."
    resolution: "Resolvido. O runner lê o artefato trafficMetricReading em JSON/YAML, conserva métricas canônicas omitidas como indisponíveis, injeta a guarda literal no prompt do Diagnosticador e falha fechado após o parse quando uma métrica indisponível recebe valor numérico. Testes unitários cobrem a rejeição e a permissão de mencionar uma métrica sem atribuir valor; a asserção E2E independente verifica CTR/CPM/alcance/frequência sem derivações. A execução regenerada registra diagnóstico sem valores derivados, hashes reconciliados e aprovação humana."

verdict: SHIP

