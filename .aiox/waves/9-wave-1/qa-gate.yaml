findings: []
resolved_findings:
  - id: "W1-QA-001"
    priority: P1
    title: "Reset do Supabase era aceito por resposta HTTP residual"
    resolution: "Runner executa Supabase no appRoot e só prossegue após provar zero usuários, workspaces e memberships no banco."
  - id: "W1-QA-002"
    priority: P2
    title: "Fixture usava campos fora do project-brief 0.1.0"
    resolution: "Fixture passou a usar campos e enums canônicos, e a importação real persiste projeto UUID e revisão ativa."
  - id: "W1-QA-003"
    priority: P2
    title: "Nova sessão reutilizava o mesmo contexto Playwright"
    resolution: "O cenário fecha o primeiro BrowserContext e autentica o owner original em um contexto novo."
  - id: "W1-QA-004"
    priority: P2
    title: "E2E poderia encerrar launcher preexistente no mesmo worktree"
    resolution: "O cenário aborta se houver processo ativo e só chama stop quando o runtimeId ainda pertence à sessão iniciada pelo próprio teste."
  - id: "W1-QA-005"
    priority: P2
    title: "Pré-condição limpa não contava projetos persistidos"
    resolution: "A prova direta agora exige zero usuários, workspaces, memberships e marketing_projects antes de abrir a UI."
  - id: "W1-QA-006"
    priority: P1
    title: "Review questionou boundary token nas chamadas diretas"
    resolution: "As chamadas usam deliberadamente a origem web /api; o proxy Vite injeta o token efêmero server-side, confirmado pela execução real sem expor o segredo."
  - id: "W1-QA-007"
    priority: P1
    title: "Reset do Supabase poderia pedir confirmação em automação"
    resolution: "O runner usa supabase db reset --local --yes, mantendo o E2E não interativo em CI e execuções sem TTY."
  - id: "W1-QA-008"
    priority: P3
    title: "PID stale reutilizado poderia bloquear o E2E"
    resolution: "O preflight usa marketing-studio status, reaproveitando a validação de command line e repoRoot do launcher antes de considerar uma sessão ativa."
  - id: "W1-QA-009"
    priority: P2
    title: "Healthcheck aceitava resposta HTTP não saudável"
    resolution: "O waitFor só conclui quando fetch retorna response.ok; 4xx/5xx continuam em retry até o timeout."
  - id: "W1-QA-010"
    priority: P2
    title: "Falha parcial de start poderia deixar launcher ativo"
    resolution: "O teardown reconhece sessão parcial pelas portas exclusivas da tentativa e chama stop mesmo antes da captura do runtimeId."
  - id: "W1-QA-011"
    priority: P2
    title: "Kong podia preservar upstream Auth antigo após reset"
    resolution: "Antes do launcher, o runner exige /auth/v1/health saudável e reinicia somente o Kong do projeto quando o upstream fica stale."
  - id: "W1-QA-012"
    priority: P1
    title: "Reset podia apagar Supabase compartilhado por outro worktree"
    resolution: "O E2E aborta se o container DB já estiver ativo; em uma rodada válida ele inicia, reseta e encerra integralmente o próprio stack."
  - id: "W1-QA-013"
    priority: P2
    title: "Falha tardia do supabase start podia deixar containers parciais ativos"
    resolution: "A tentativa de start passa a ser ownership suficiente para o teardown; o fluxo exige DB/Auth/REST/Kong e encerra explicitamente o project_id, mesmo quando um serviço auxiliar atrasa o healthcheck da CLI."
